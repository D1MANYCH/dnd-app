# TOOL-3: CI на тесты + инвариант релиза.
# Пуш в main = релиз на GitHub Pages, поэтому каждый push/PR прогоняет
# headless-тесты и сверку версий (см. CLAUDE.md «Версионирование»).
name: tests

on: [push, pull_request]

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Headless-тесты
        run: node tests/headless-node.js
      - name: Инвариант релиза (APP_VERSION ↔ APP_CHANGELOG ↔ CACHE_NAME ↔ ?v= ↔ CHANGELOG.md)
        run: node tools/check-invariant.js
