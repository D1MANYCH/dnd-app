# Деплой на GitHub Pages через Actions (замена легаси-пайплайна «Deploy from a branch»).
# ТРЕБУЕТ: Settings → Pages → Build and deployment → Source = «GitHub Actions».
# Сайт статический (vanilla, без сборки) — артефакт = корень репозитория как есть, без Jekyll.
name: pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Один деплой за раз; начатый не отменяем, чтобы не оставить продакшен в промежуточном состоянии.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v5
