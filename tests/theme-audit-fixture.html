<!doctype html>
<meta charset="utf-8">
<title>theme-audit-fixture</title>
<style>html,body{margin:0;height:100%;background:#050a14}iframe{position:fixed;inset:0;width:100vw;height:100vh;border:0}</style>
<iframe id="f"></iframe>
<script>
// THEME-3: постоянная фикстура аудита тем (аналог tour-fixture.html из THEME-1).
// Открывает приложение в iframe, сеет персонажа-волшебника 5 ур. с ячейками/состояниями/
// инвентарём, глушит rAF+WebGL и позиционирует нужный экран — для headless-скриншотов:
//   chrome --headless=new --disable-gpu --hide-scrollbars --window-size=1280,800
//     --virtual-time-budget=15000 --screenshot=out.png
//     "http://localhost:3017/tests/theme-audit-fixture.html?tab=spells&scroll=1100"
// Параметры: ?tab=sheet|spells|inventory|battle|notes|party|journal · &theme=dark|light
//   &modal=settings|levelup · &scroll=N · &keepbg=1 (не прятать космо-канвас)
//   &battle=N (CAST-2: активный бой на раунде N + каст «Ускорения» — трекер/бейдж раундов)
//   &modal=cast|castdamage|castvariant (чузер ячейки · пикер цели урона · чузер варианта)
//   &set=--token:value;--token:value (A/B-инъекция токенов без правки файлов)
// Диагностика: HTTP-маячок GET /__diag?... в stdout сервера (см. skills/verify-ui п.6).
const q = new URLSearchParams(location.search);
const beacon = m => { try { fetch('/__diag?' + encodeURIComponent(m)).catch(()=>{}); } catch (e) {} };
try {
  localStorage.clear();
  ['seen','sheet_seen','spells_seen','inventory_seen','battle_seen','notes_seen','party_seen','journal_seen']
    .forEach(k => localStorage.setItem('dnd_help_' + k, '1'));
  localStorage.setItem('dnd_help_level', 'known');
  localStorage.setItem('dnd_theme', q.get('theme') || 'dark');
} catch (e) { beacon('ERR seed ' + e.message); }
const f = document.getElementById('f');
f.src = '/index.html';
f.addEventListener('load', () => {
  const w = f.contentWindow;
  setTimeout(async () => {
    try {
      w.requestAnimationFrame = () => 0;
      await w.applyBuild('wizard-evoker');
      const c = w.characters[0];
      c.level = 5; c.classes[0].level = 5;
      c.combat.hpMax = 32; c.combat.hpCurrent = 19; c.combat.hpTemp = 4;
      c.spells.slots['1'] = 4; c.spells.slots['2'] = 3; c.spells.slots['3'] = 2;
      c.spells.slotsUsed['1'] = 2; c.spells.slotsUsed['2'] = 1;
      c.conditions = ['poisoned', 'frightened'];
      c.inventory.armor.push({ name: 'Кожаный доспех', qty: 1, weight: 10, location: 'worn', desc: 'КД 11 + ЛОВ' });
      c.inventory.potion.push({ name: 'Зелье лечения', qty: 2, weight: 0.5, location: 'belt', desc: '2к4+2 хитов' });
      c.inventory.scroll.push({ name: 'Свиток огненного шара', qty: 1, weight: 0, location: 'backpack', desc: 'Огненный шар, 3 ур.' });
      c.inventory.tool.push({ name: 'Воровские инструменты', qty: 1, weight: 1, location: 'backpack', desc: 'Набор инструментов' });
      w.saveToLocal();
      if (typeof w.closeModal === 'function') { try { w.closeModal('build-guide-modal'); } catch (e) {} }
      const bg = w.document.getElementById('build-guide-modal');
      if (bg) { bg.classList.remove('show', 'active'); bg.style.display = 'none'; }
      w.loadCharacter(c.id);
      // CAST-2: &battle=N — активный бой (я + гоблин) на раунде N c кастом
      // «Ускорение» (тикающий бафф) для скриншотов трекера/бейджа раундов
      const battleRound = parseInt(q.get('battle') || '0', 10);
      if (battleRound) {
        try {
          const ch = w.getCurrentChar();
          const haste = w.SPELL_DATABASE.find(s => s.name === 'Ускорение' && s.source !== 'PH24');
          if (haste && !(ch.spells.mySpells || []).some(s => s.id === haste.id)) {
            ch.spells.mySpells.push(JSON.parse(JSON.stringify(haste)));
            w._castSpellWithSlot(haste.id, 'slot', 3);
          }
          w.BATTLE_DATA = { active: true, currentTurn: 0, round: battleRound, participants: [
            { name: ch.name, type: 'self', status: 'healthy', initiative: 14 },
            { name: 'Гоблин', type: 'monster', icon: '🗡️', status: 'wounded', initiative: 9,
              hpCurrent: 4, hpMax: 7 }
          ]};
          w.saveBattle();
        } catch (e) { beacon('ERR battle ' + e.message); }
      }
      const tab = q.get('tab') || 'sheet';
      if (tab !== 'sheet') w.switchTab(tab);
      const modal = q.get('modal') || '';
      if (modal === 'settings') w.openSettingsModal();
      else if (modal === 'whatsnew') w.showWhatsNewModal('3.42.0', (w.APP_VERSION || '3.43.3'));
      else if (modal === 'levelup') w.openLevelUpModal();
      setTimeout(() => {
        const sc = parseInt(q.get('scroll') || '0', 10);
        if (sc) { try { w.scrollTo(0, sc); w.document.documentElement.scrollTop = sc; } catch (e) {} }
        const setStr = q.get('set') || '';
        if (setStr) {
          setStr.split(';').forEach(pair => {
            const i = pair.indexOf(':');
            if (i > 0) w.document.documentElement.style.setProperty(pair.slice(0, i).trim(), pair.slice(i + 1).trim());
          });
        }
        // castSpell-верификация: &expandspells=1 раскрывает карточки заклинаний
        // (кнопки действий видны только в раскрытой), &modal=cast открывает чузер
        // уровня ячейки первого уровневого заклинания.
        if (q.get('expandspells')) {
          try {
            w.document.querySelectorAll('.my-spell-item').forEach(el => el.classList.add('expanded'));
          } catch (e) {}
        }
        if (modal === 'cast') {
          try {
            const ch = w.getCurrentChar();
            const sp = (ch.spells.mySpells || []).find(s => s.level > 0);
            if (sp && typeof w.openCastChooser === 'function')
              w.openCastChooser(sp, w._castableSlotOptions(ch, sp));
          } catch (e) { beacon('ERR cast ' + e.message); }
        }
        // CAST-7b: &modal=castdamage — пикер цели для урона каста (с переключателем
        // «полный/половина» от halfOnSave). Ставит свой бой: у участников поле hp
        // (ветка &battle= пишет hpCurrent — пикеру нужен снимок p.hp/p.hpMax).
        if (modal === 'castdamage') {
          try {
            // Обработчик 'load' iframe может отработать дважды (перерегистрация SW):
            // на раннем проходе персонаж ещё не загружен и getCurrentChar() пуст.
            // НЕ выходим через return — ниже ещё глушение canvas и маячок READY.
            const ch = w.getCurrentChar();
            if (!ch) {
              beacon('SKIP castdamage — персонаж ещё не загружен');
            } else {
              w.BATTLE_DATA = { active: true, currentTurn: 0, round: 3, participants: [
                { id: 's',  name: ch.name, type: 'self',    icon: '🧙', status: 'healthy', initiative: 14 },
                { id: 'm1', name: 'Гоблин', type: 'monster', icon: '🗡️', status: 'wounded', initiative: 9,  hp: 12, hpMax: 20 },
                { id: 'm2', name: 'Огр',    type: 'monster', icon: '🗿', status: 'healthy', initiative: 6,  hp: 59, hpMax: 59 }
              ]};
              w.saveBattle();
              w.offerCastDamageToBattle('Огненный шар', 29, { half: true });
            }
          } catch (e) { beacon('ERR castdamage ' + e.message); }
        }
        // CAST-8a: &modal=castvariant — мини-чузер варианта каста. Берём
        // «Проклятие»: у него опции с подсказками (cvo-name + cvo-hint) — видно
        // обе строки. Заклинание доносим в книгу вручную: билд-эвокер его не
        // знает, а чузер строится из дескриптора SPELL_EFFECTS.
        if (modal === 'castvariant') {
          try {
            const ch = w.getCurrentChar();
            if (!ch) {
              beacon('SKIP castvariant — персонаж ещё не загружен');
            } else {
              const sp = w.SPELL_DATABASE.find(s => s.name === 'Проклятие' && s.source !== 'PH24');
              if (!sp) beacon('SKIP castvariant — нет заклинания в базе');
              else {
                if (!(ch.spells.mySpells || []).some(s => s.id === sp.id))
                  ch.spells.mySpells.push(JSON.parse(JSON.stringify(sp)));
                w.saveToLocal();
                w.openCastVariantChooser(sp, { type: 'slot', level: 3 }, w.getSpellEffect(sp.name, sp.source));
              }
            }
          } catch (e) { beacon('ERR castvariant ' + e.message); }
        }
        if (!q.get('keepbg')) {
          try {
            w.document.querySelectorAll('canvas').forEach(cv => {
              try { const gl = cv.getContext('webgl2') || cv.getContext('webgl');
                if (gl) { const x = gl.getExtension('WEBGL_lose_context'); if (x) x.loseContext(); } } catch (e) {}
              cv.style.display = 'none';
            });
          } catch (e) {}
        }
        beacon('READY tab=' + tab + ' modal=' + modal + ' vw=' + w.innerWidth);
        document.title = 'READY';
      }, 600);
    } catch (e) { beacon('ERR ' + (e && e.message)); }
  }, 700);
});
</script>
